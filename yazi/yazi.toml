[manager]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/x-yaml", use = "edit" },
    { mime = "application/toml", use = "edit" },
    { name = "*.md", use = "edit" },
    { name = "*.tex", use = "edit" },
    { name = "*.bib", use = "edit" },
    { name = "*.py", use = "edit" },
    { name = "*.lua", use = "edit" },
    { name = "*.sh", use = "edit" },
    { name = "*.m", use = "edit" },
    { name = "*.R", use = "edit" },
    { name = "*", use = "edit" },
]
